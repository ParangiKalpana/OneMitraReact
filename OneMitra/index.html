<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts: preconnect + async-friendly load, instead of a render-blocking @import in CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <title>OneMitra</title>
    <meta
      name="description"
      content="OneMitra partners with businesses on web development, web design, digital marketing, SEO, and business consulting — strategy that gets executed, results you can measure."
    />
    <link rel="canonical" href="https://onemitra.com/" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OneMitra | Consulting, Web & Digital Growth Partner" />
    <meta
      property="og:description"
      content="OneMitra partners with businesses on web development, web design, digital marketing, SEO, and business consulting."
    />
    <meta property="og:url" content="https://onemitra.com/" />
    <meta property="og:image" content="https://onemitra.com/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OneMitra | Consulting, Web & Digital Growth Partner" />
    <meta
      name="twitter:description"
      content="OneMitra partners with businesses on web development, web design, digital marketing, SEO, and business consulting."
    />
    <meta name="twitter:image" content="https://onemitra.com/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
